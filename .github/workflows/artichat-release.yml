name: ArtiChat Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

concurrency:
  group: artichat-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set release metadata
        shell: bash
        run: |
          set -Eeuo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          printf 'VERSION=%s\n' "$VERSION" >> "$GITHUB_ENV"
          printf 'IMAGE=%s\n' "$IMAGE" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Verify release version
        run: npm run test:release-version -- --tag="$GITHUB_REF_NAME"

      - name: Verify branding
        run: npm run test:branding

      - name: Verify subscriptions
        run: npm run test:subscriptions

      - name: Verify update system
        run: npm run test:updates

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        shell: bash
        run: |
          set -Eeuo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --build-arg "BUILD_HASH=${GITHUB_SHA}" \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            --cache-from "type=registry,ref=${IMAGE}:buildcache" \
            --cache-to "type=registry,ref=${IMAGE}:buildcache,mode=max" \
            --push \
            .

      - name: Inspect published image
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -Eeuo pipefail
          RELEASE_NOTES="docs/releases/${VERSION}.md"
          [[ -f "$RELEASE_NOTES" ]] || {
            echo "release notes are missing: $RELEASE_NOTES" >&2
            exit 1
          }
          gh release create "v${VERSION}" \
            --title "ArtiChat ${VERSION}" \
            --notes-file "$RELEASE_NOTES" \
            --verify-tag
