services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  artichat:
    build:
      context: .
      dockerfile: Dockerfile
    image: artichat:${ARTICHAT_DOCKER_TAG-main}
    container_name: artichat
    volumes:
      - artichat-data:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${ARTICHAT_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  artichat-data:
    name: artichat_data
